name: profile

# Regenerate the org index (profile/README.md) from every repo's own metadata
# (Cargo.toml description + [package.metadata.orca].category) and icon. New repos
# appear automatically once they carry that metadata — nothing is hand-maintained.

on:
  schedule:
    - cron: "17 6 * * *" # daily
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - bin/labs
      - .github/workflows/profile.yml

permissions:
  contents: write

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Regenerate profile/README.md
        env:
          GH_TOKEN: ${{ github.token }}
        run: bin/labs profile

      - name: Commit if changed
        run: |
          if [[ -n "$(git status --porcelain profile/README.md)" ]]; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add profile/README.md
            git commit -m "chore: regenerate org index [skip ci]"
            git push
          else
            echo "index already up to date"
          fi
